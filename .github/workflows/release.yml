name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: ubuntu-24.04
            target: linux-amd64
          - os: ubuntu-24.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.os }}
    # macos-13 (Intel) free runners are dropped: capacity has been so
    # unreliable that release publish kept blocking indefinitely. Intel
    # mac users can build from source via opam.
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.3"

      - name: Install dependencies
        run: |
          opam install -y dune base cmdliner eio eio_main yojson logs fmt incremental domainslib alcotest

      - name: Build
        run: opam exec -- dune build --release

      - name: Test
        run: opam exec -- dune runtest

      - name: Package
        run: |
          mkdir -p dist
          cp _build/default/bin/main.exe dist/morph
          chmod +x dist/morph
          tar -czf "morph-${TARGET}.tar.gz" -C dist morph

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: morph-${{ matrix.target }}
          path: morph-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Compute checksums
        run: |
          cd artifacts
          shasum -a 256 *.tar.gz > checksums.txt
          cat checksums.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
          generate_release_notes: true
